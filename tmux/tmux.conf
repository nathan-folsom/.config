set -g mouse on
set -g set-titles on
set -g set-titles-string "#{b:session_path}#{?#{==:#{@cursor_state},ready}, 🟢,}"
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
bind -n S-Space send-keys Space
bind -n S-BSpace send-keys BSpace

bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
